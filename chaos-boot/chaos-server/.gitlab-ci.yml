image: docker:19.03.1
variables:
  DOCKER_TLS_CERTDIR: "/certs"
  MAVEN_CLI_OPTS: "-s ./../maven/settings.xml --batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2"
services:
  - docker:19.03.1-dind
cache:
  key: maven-repository-cache
  paths:
    - .m2
stages:
  - package
  - build
maven-package:
  before_script:
    - echo "maven-package starting..."
  image: maven:3.5-jdk-8-alpine
  tags:
    - maven
  stage: package
  script:
    - cd chaos-server
    - mvn $MAVEN_CLI_OPTS $MAVEN_OPTS clean package  -Dmaven.test.skip=true
    - echo "build success"
  artifacts:
    paths:
      - chaos-server/target/*.jar
    expire_in: 1 day
build-master:
  tags:
    - docker
  stage: build
  script:
    - cd chaos-server
    - docker build -t  chaos-server .
    - docker tag chaos-server firepongo.tech:8288/chaos/chaos-server
    - docker login  --username="admin" --password="Harbor12345" firepongo.tech:8288
    - docker push firepongo.tech:8288/chaos/chaos-server
  only:
    - master
