spring:
  application:
    name: server-eurka
eureka:
  instance:
    hostname: localhost
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://dev.firepongo.tech:8761/eureka/,http://dev.firepongo.tech:8762/eureka/,http://dev.firepongo.tech:8763/eureka/
  server:
    eviction-interval-timer-in-ms: 5000 #清理间隔（单位毫秒，默认是60*1000）
    enable-self-preservation: true # 默认为true，设为false，关闭自我保护
    # Eureka Server 在运行期间会去统计心跳失败比例在 15 分钟之内是否低于 85%
    renewal-percent-threshold: 0.49 # 默认是0.85，本地单机测试设为0.49
