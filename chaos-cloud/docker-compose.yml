version: '3'
services:
  nacos:
    container_name: c-nacos
    image: nacos/nacos-server
    restart: always
    environment:
      MODE: standalone
    ports:
      - 8848:8848
    networks:
      - cui-ci
  nginx:
    image: nginx:latest
    container_name: c-nginx
    volumes:
      - ./nginx/www/:/usr/share/nginx/html
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/cert:/etc/nginx/cert
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/logs:/var/log/nginx
    ports:
      - 80:80
    restart: always
    networks:
      - cui-ci
  redis:
    image: redis:latest
    container_name: c-redis
    restart: always
    command: redis-server --requirepass firepongo!tech
    ports:
      - 6379:6379
    volumes:
      - ./redis/data:/data
    networks:
      - cui-ci
  nexus3:
    container_name: c-nexus3
    image: sonatype/nexus3
    restart: always
    volumes:
      - ./nexus/data:/nexus-data
    ports:
      - 8081:8081
      - 8082:8082
      - 8083:8083
      - 8084:8084
      - 8085:8085
    networks:
      - cui-ci
  zookeeper:
    image: zookeeper:latest
    container_name: c-zookeeper
    networks:
      - cui-ci
    ports:
      - 2181:2181
    volumes:
      - ./zookeeper:/conf/
    restart: always
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: c-zipkin
    networks:
      - cui-ci
    ports:
      - 9411:9411
    restart: always
networks:
  cui-ci:
    driver: bridge
